name: Release

# Se dispara cuando se crea un tag con formato v* (ej: v1.0.1, v2.0.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # necesario para crear el Release y subir artefactos

jobs:
  build-win:
    name: Build & Publish (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (Vite + TypeScript Electron)
        run: npm run build

      - name: Empaquetar y publicar instalador en GitHub Releases
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
